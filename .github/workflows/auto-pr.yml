name: Catalog Update Notification

on:
  push:
    branches:
      - 'update-catalog-*'

jobs:
  notify-owners:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write

    steps:
      - name: Notify Repo Owners
        uses: actions/github-script@v7
        env:
          OWNER_MENTION: ${{ vars.OWNER_MENTION }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const ownerLogin = context.payload.repository.owner.login;
            const mention = process.env.OWNER_MENTION && process.env.OWNER_MENTION.trim()
              ? process.env.OWNER_MENTION.trim()
              : `@${ownerLogin}`;

            const title = `Catalog update notification: ${branch}`;
            const body = [
              `${mention}`,
              '',
              'A model catalog update branch was pushed and needs owner attention.',
              '',
              `- Branch: \`${branch}\``,
              `- Commit: ${context.sha}`,
              `- Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              creator: 'github-actions[bot]',
              per_page: 100
            });

            const existing = issues.find(i => i.title === title);

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body
              });
              core.info(`Updated existing notification issue: #${existing.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body
              });
              core.info(`Created notification issue: #${created.data.number}`);
            }
