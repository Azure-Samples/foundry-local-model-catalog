name: Catalog Update Notification

on:
  push:
    branches:
      - 'update-catalog-*'

jobs:
  notify-owners:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write

    steps:
      - name: Notify Repo Owners
        uses: actions/github-script@v7
        env:
          OWNER_MENTION: ${{ vars.OWNER_MENTION }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const ownerLogin = context.payload.repository.owner.login;
            const rawOwnerMention = process.env.OWNER_MENTION || '';
            const mentionTargets = rawOwnerMention
              .split(/[\s,]+/)
              .map(value => value.trim())
              .filter(Boolean)
              .map(value => value.replace(/^@+/, ''));

            const mentions = mentionTargets.length > 0
              ? mentionTargets.map(value => `@${value}`)
              : [`@${ownerLogin}`];

            // Issue assignees must be user logins (no org/team mentions).
            const assignees = mentionTargets
              .filter(value => !value.includes('/'))
              .filter(value => /^[A-Za-z0-9-]+$/.test(value));

            const title = `Catalog update notification: ${branch}`;
            const body = [
              mentions.join(' '),
              '',
              'A model catalog update branch was pushed and needs owner attention.',
              '',
              `- Branch: \`${branch}\``,
              `- Commit: ${context.sha}`,
              `- Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              creator: 'github-actions[bot]',
              per_page: 100
            });

            const existing = issues.find(i => i.title === title);

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body
              });

              if (assignees.length > 0) {
                try {
                  await github.rest.issues.addAssignees({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: existing.number,
                    assignees
                  });
                } catch (error) {
                  core.warning(`Failed to assign issue #${existing.number}: ${error.message}`);
                }
              }

              core.info(`Updated existing notification issue: #${existing.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body
              });

              if (assignees.length > 0) {
                try {
                  await github.rest.issues.addAssignees({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: created.data.number,
                    assignees
                  });
                } catch (error) {
                  core.warning(`Failed to assign issue #${created.data.number}: ${error.message}`);
                }
              }

              core.info(`Created notification issue: #${created.data.number}`);
            }
