name: Auto PR

on:
  push:
    branches:
      - 'update-catalog-*'

jobs:
  create-pr:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          existing_pr_url="$(gh pr list \
            --head "$BRANCH_NAME" \
            --base main \
            --state open \
            --json url \
            --jq '.[0].url')"

          if [[ -n "$existing_pr_url" && "$existing_pr_url" != "null" ]]; then
            echo "PR already exists: $existing_pr_url"
            exit 0
          fi

          gh pr create \
            --base main \
            --head "$BRANCH_NAME" \
            --title "Automatic Catalog Update PR: $BRANCH_NAME" \
            --body "Automatically created when the Model Catalog was updated. Please review the changes and merge if everything looks good."
