trigger: none

pr: none

variables:
  LinuxContainerImage: 'mcr.microsoft.com/onebranch/azurelinux/build:3.0'
  azureServiceConnection: 'MSC Edge FoundryOnArc Dev SP CORP'
  aksArcResourceGroup: 'rg-foundry-mnbugbash05-weu'
  aksArcClusterName: 'aks-foundry-mnbugbash05-weu'

pool:
  vmImage: ubuntu-latest

steps:
- checkout: self
  fetchDepth: 0
  persistCredentials: true

- bash: |
    set -euo pipefail

    git config user.name "ado-pr-bot"
    git config user.email "ado-pr-bot@users.noreply.github.com"

    BRANCH="ado-smoke-pr-$(Build.BuildId)-$(date -u +%Y%m%d%H%M%S)"
    echo "##vso[task.setvariable variable=SmokeBranchName]$BRANCH"

    git checkout -b "$BRANCH"

    mkdir -p pipeline-smoke
    printf '%s\n' \
      "This file was created by Azure DevOps pipeline." \
      "BuildId: $(Build.BuildId)" \
      "BuildNumber: $(Build.BuildNumber)" \
      "UTC: $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
      > pipeline-smoke/pr-smoke.txt

    git add pipeline-smoke/pr-smoke.txt
    git commit -m "chore: add ADO PR smoke file (build $(Build.BuildId))"
    git push -u origin "$BRANCH"
  displayName: Create smoke file branch and push to GitHub

- task: AzureCLI@2
  displayName: Connect to AKS Arc cluster and list all pods
  inputs:
    azureSubscription: '$(azureServiceConnection)'
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      set -euo pipefail

      az extension add --name aksarc --upgrade --yes
      az aksarc get-credentials \
        --resource-group "$(aksArcResourceGroup)" \
        --name "$(aksArcClusterName)" \
        --overwrite-existing

      kubectl get po -A

