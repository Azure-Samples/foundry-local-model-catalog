trigger:
- main

pr:
- main

variables:
- name: githubServiceConnection
  value: CHANGE_ME_GITHUB_SERVICE_CONNECTION

pool:
  vmImage: ubuntu-latest

steps:
- checkout: self
  fetchDepth: 0
  persistCredentials: true

- bash: |
    set -euo pipefail

    git config user.name "ado-pr-bot"
    git config user.email "ado-pr-bot@users.noreply.github.com"

    BRANCH="ado-smoke-pr-$(Build.BuildId)-$(date -u +%Y%m%d%H%M%S)"
    echo "##vso[task.setvariable variable=SmokeBranchName]$BRANCH"

    git checkout -b "$BRANCH"

    mkdir -p pipeline-smoke
    printf '%s\n' \
      "This file was created by Azure DevOps pipeline." \
      "BuildId: $(Build.BuildId)" \
      "BuildNumber: $(Build.BuildNumber)" \
      "UTC: $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
      > pipeline-smoke/pr-smoke.txt

    git add pipeline-smoke/pr-smoke.txt
    git commit -m "chore: add ADO PR smoke file (build $(Build.BuildId))"
    git push -u origin "$BRANCH"
  displayName: Create smoke file branch and push to GitHub

- task: GitHubCreatePullRequest@0
  displayName: Open GitHub PR from smoke branch
  inputs:
    gitHubConnection: '$(githubServiceConnection)'
    repositoryName: 'Azure-Samples/foundry-local-model-catalog'
    sourceBranch: '$(SmokeBranchName)'
    targetBranch: 'main'
    title: 'ADO smoke PR: build $(Build.BuildId)'
    description: 'Automated PR created by Azure DevOps pipeline smoke test.'