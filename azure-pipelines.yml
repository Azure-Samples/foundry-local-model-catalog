trigger:
- main

pr:
- main

variables:
- name: githubServiceConnection
  value: "github.com_Azure-Samples (1)"

pool:
  vmImage: ubuntu-latest

steps:
- checkout: self
  fetchDepth: 0
  persistCredentials: true

- bash: |
    set -euo pipefail

    git config user.name "ado-pr-bot"
    git config user.email "ado-pr-bot@users.noreply.github.com"

    BRANCH="ado-smoke-pr-$(Build.BuildId)-$(date -u +%Y%m%d%H%M%S)"
    echo "##vso[task.setvariable variable=SmokeBranchName]$BRANCH"

    git checkout -b "$BRANCH"

    mkdir -p pipeline-smoke
    printf '%s\n' \
      "This file was created by Azure DevOps pipeline." \
      "BuildId: $(Build.BuildId)" \
      "BuildNumber: $(Build.BuildNumber)" \
      "UTC: $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
      > pipeline-smoke/pr-smoke.txt

    git add pipeline-smoke/pr-smoke.txt
    git commit -m "chore: add ADO PR smoke file (build $(Build.BuildId))"
    git push -u origin "$BRANCH"
  displayName: Create smoke file branch and push to GitHub

- bash: |
    set -euo pipefail

    REPO="Azure-Samples/foundry-local-model-catalog"
    BASE="main"
    HEAD_BRANCH="$(SmokeBranchName)"
    HEAD_REF="Azure-Samples:${HEAD_BRANCH}"

    # Reuse auth configured by checkout with persistCredentials.
    AUTH_HEADER="$(git config --get-all http.https://github.com/.extraheader | grep -im1 '^AUTHORIZATION:' || true)"
    if [[ -z "$AUTH_HEADER" ]]; then
      echo "Could not find GitHub auth header from persisted credentials."
      exit 1
    fi

    # Idempotency: if an open PR already exists for this branch, reuse it.
    existing_response=$(curl -sS \
      -H "$AUTH_HEADER" \
      -H "Accept: application/vnd.github+json" \
      "https://api.github.com/repos/${REPO}/pulls?state=open&head=${HEAD_REF}")

    existing_pr_url=$(python3 - <<'PY' "$existing_response"
import json
import sys
data = json.loads(sys.argv[1])
if isinstance(data, list) and data:
    print(data[0].get("html_url", ""))
else:
    print("")
PY
    )

    if [[ -n "$existing_pr_url" ]]; then
      echo "PR already exists: $existing_pr_url"
      echo "##vso[task.setvariable variable=SmokePrUrl]$existing_pr_url"
      exit 0
    fi

    payload=$(cat <<JSON
    {
      "title": "ADO smoke PR: build $(Build.BuildId)",
      "head": "${HEAD_REF}",
      "base": "${BASE}",
      "body": "Automated PR created by Azure DevOps pipeline smoke test."
    }
JSON
    )

    create_response=$(curl -sS -X POST \
      -H "$AUTH_HEADER" \
      -H "Accept: application/vnd.github+json" \
      -H "Content-Type: application/json" \
      "https://api.github.com/repos/${REPO}/pulls" \
      -d "$payload")

    pr_url=$(python3 - <<'PY' "$create_response"
import json
import sys
data = json.loads(sys.argv[1])
print(data.get("html_url", ""))
PY
    )

    if [[ -z "$pr_url" ]]; then
      echo "Failed to create PR. API response:"
      echo "$create_response"
      exit 1
    fi

    echo "PR created: $pr_url"
    echo "##vso[task.setvariable variable=SmokePrUrl]$pr_url"
  displayName: Create GitHub PR automatically
