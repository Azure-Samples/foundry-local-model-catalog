trigger:
- main

pr:
- main

pool:
  vmImage: ubuntu-latest

steps:
- checkout: self
  fetchDepth: 0
  persistCredentials: true

- bash: |
    set -euo pipefail

    git config user.name "ado-pr-bot"
    git config user.email "ado-pr-bot@users.noreply.github.com"

    BRANCH="ado-smoke-pr-$(Build.BuildId)-$(date -u +%Y%m%d%H%M%S)"
    echo "##vso[task.setvariable variable=SmokeBranchName]$BRANCH"

    git checkout -b "$BRANCH"

    mkdir -p pipeline-smoke
    printf '%s\n' \
      "This file was created by Azure DevOps pipeline." \
      "BuildId: $(Build.BuildId)" \
      "BuildNumber: $(Build.BuildNumber)" \
      "UTC: $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
      > pipeline-smoke/pr-smoke.txt

    git add pipeline-smoke/pr-smoke.txt
    git commit -m "chore: add ADO PR smoke file (build $(Build.BuildId))"
    git push -u origin "$BRANCH"
  displayName: Create smoke file branch and push to GitHub

- bash: |
    set -euo pipefail

    REPO="Azure-Samples/foundry-local-model-catalog"
    HEAD_REF="Azure-Samples:$(SmokeBranchName)"

    # Reuse auth configured by checkout with persistCredentials.
    AUTH_HEADER="$(git config --get-all http.https://github.com/.extraheader | grep -im1 '^AUTHORIZATION:' || true)"

    # Fallback: Azure Pipelines App auth may be exposed through git credential helper, not extraheader.
    if [[ -z "$AUTH_HEADER" ]]; then
      cred_output="$(printf 'protocol=https\nhost=github.com\n\n' | git credential fill || true)"
      GH_USER="$(echo "$cred_output" | awk -F= '/^username=/{print $2; exit}')"
      GH_PASS="$(echo "$cred_output" | awk -F= '/^password=/{print $2; exit}')"

      if [[ -n "$GH_USER" && -n "$GH_PASS" ]]; then
        basic_b64="$(printf '%s' "${GH_USER}:${GH_PASS}" | python3 -c 'import base64,sys; print(base64.b64encode(sys.stdin.buffer.read()).decode())')"
        AUTH_HEADER="Authorization: Basic ${basic_b64}"
      fi
    fi

    if [[ -z "$AUTH_HEADER" ]]; then
      echo "Could not resolve GitHub credentials from persisted checkout auth."
      echo "Ensure checkout uses persistCredentials: true and repo is connected via GitHub service connection."
      exit 1
    fi

    payload="{\"title\":\"ADO smoke PR: build $(Build.BuildId)\",\"head\":\"${HEAD_REF}\",\"base\":\"main\",\"body\":\"Automated PR created by Azure DevOps pipeline smoke test.\"}"

    create_response=$(curl -sS -X POST -H "$AUTH_HEADER" -H "Accept: application/vnd.github+json" -H "Content-Type: application/json" "https://api.github.com/repos/${REPO}/pulls" -d "$payload")

    pr_url=$(echo "$create_response" | python3 -c 'import sys, json; print(json.load(sys.stdin).get("html_url", ""))')

    if [[ -z "$pr_url" ]]; then
      echo "Failed to create PR. API response:"
      echo "$create_response"
      exit 1
    fi

    echo "PR created: $pr_url"
    echo "##vso[task.setvariable variable=SmokePrUrl]$pr_url"
  displayName: Create GitHub PR automatically
